name: Deploy to Cloudflare Pages

# This action runs every time you push to the 'main' or 'master' branch
on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Minify JS and HTML
        run: |
          npm install -g html-minifier-terser terser
          
          echo "Total directory size before minification:"
          du -sh .
          
          # Minify HTML (recursive)
          html-minifier-terser --input-dir . --output-dir . --collapse-whitespace --remove-comments --remove-optional-tags --remove-redundant-attributes --remove-script-type-attributes --remove-tag-whitespace --use-short-doctype --minify-js true --minify-css true --file-ext html
          
          # Minify JS and MJS (recursive), skipping already minified files
          find . -type f \( -name "*.js" -o -name "*.mjs" \) -not -path "./.git/*" -not -path "./node_modules/*" -not -name "*.min.js" -not -name "*.min.mjs" -exec echo "Minifying {}" \; -exec terser {} -o {} --compress --mangle \;
          
          echo "Total directory size after minification:"
          du -sh .

      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # The exact same deployment command we run on your local terminal!
          command: pages deploy . --project-name=fiona-portfolio --branch main
        env:
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
